name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features

      - name: Build all crates
        run: cargo build --release --all

      - name: Run tests
        run: cargo test --all

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [rust, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release binaries
        run: cargo build --release --all

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Create release archive
        run: |
          mkdir -p release
          cp target/release/agent target/release/ingest target/release/api release/
          cp -r frontend/dist release/frontend
          cp deploy/deploy.sh deploy/setup.sh release/
          cp mitm_agent.py release/
          cd release && tar czf ../traffic-analyzer-${{ github.ref_name }}.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: traffic-analyzer-*.tar.gz
          generate_release_notes: true
