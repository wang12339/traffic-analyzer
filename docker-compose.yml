services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"   # HTTP
      - "9000:9000"   # Native
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./deploy/clickhouse-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  ingest:
    build:
      context: .
      dockerfile: deploy/Dockerfile.ingest
    ports:
      - "9100:9100"       # Agent TCP
      - "2055:2055/udp"   # Python agent UDP
    environment:
      RUST_LOG: info
    command: ["/app/ingest", "--clickhouse", "clickhouse:8123"]
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    ports:
      - "8970:8970"
    environment:
      RUST_LOG: info
      # 设置持久 API Key（否则每次启动随机生成）：
      # API_KEY: my-secret-key
    command: ["/app/api", "--clickhouse", "http://clickhouse:8123", "--listen", "0.0.0.0:8970"]
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

volumes:
  clickhouse-data:
