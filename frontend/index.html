<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌐</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流量分析系统</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f13; color: #e0e0e0; }
      :root { --bg-primary: #0f0f13; --bg-card: #1a1a24; --bg-hover: #252535; --accent: #6366f1; --accent-dim: #4f46e5; --text-primary: #e0e0e0; --text-secondary: #8888a0; --border: #2a2a3a; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; }
      @media (max-width: 768px) {
        body { font-size: 14px; padding: 0 !important; }
        h1 { font-size: 18px !important; }
        h3 { font-size: 13px !important; }
        table, td, th { font-size: 11px !important; padding: 4px 6px !important; }
        input, select, button { font-size: 13px !important; }
        div[style*="grid-template-columns"] {
          grid-template-columns: 1fr 1fr !important;
          gap: 8px !important;
        }
        div[style*="1400"] {
          padding: 12px !important;
          max-width: 100% !important;
        }
        div[style*="display:flex"][style*="justify-content: space-between"] {
          flex-wrap: wrap !important;
          gap: 4px !important;
        }
        div[style*="overflow-x: auto"] {
          -webkit-overflow-scrolling: touch !important;
        }
        nav { overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        nav button { font-size: 12px !important; padding: 8px 12px !important; }
        pre { font-size: 10px !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
